name: Deploy site to GitHub Pages

on:
  # Rebuild + deploy on every push to main (edit your md, commit, and it publishes)
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 22
        # Auto-detects package manager, builds, and uploads the artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
